# Orchestration de l'outillage SIPC. Le dépôt est monté dans /sipc.
# Usage : `docker compose run --rm sipc <commande>` ou via le Makefile.
services:
  sipc:
    build: .
    image: sipc-tools:latest
    working_dir: /sipc
    volumes:
      - .:/sipc
    ports:
      - "8000:8000"

  # Compilation LaTeX du papier académique (source de vérité : paper/sipc_paper.tex).
  latex:
    image: texlive/texlive:latest
    working_dir: /sipc
    volumes:
      - .:/sipc
